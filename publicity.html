<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publicity — Veronica Ward</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,700;0,800;1,400;1,500&display=swap" rel="stylesheet">
    <style>
        :root {
            font-size: clamp(16px, 1.4vw, 22px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #fff;
            color: #111;
            font-family: 'EB Garamond', Garamond, 'Times New Roman', serif;
            -webkit-font-smoothing: antialiased;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        /* ── TOP BAR ── */
        header {
            position: sticky;
            top: 0;
            background: #fff;
            z-index: 100;
        }

        .header-inner {
            max-width: 960px;
            margin: 0 auto;
            padding: 32px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .site-name {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        nav {
            display: flex;
            gap: 28px;
            font-size: 1rem;
            letter-spacing: 0.03em;
        }

        nav a {
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        nav a:hover,
        nav a.active {
            opacity: 1;
        }

        /* ── PUBLICITY CONTENT ── */
        main {
            padding: 64px 0 96px;
        }

        .publicity {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 40px;
        }

        .press-grid {
            display: flex;
            flex-direction: column;
            gap: 64px;
        }

        .press-item figure {
            margin: 0;
        }

        .press-images {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 12px;
        }

        .press-images .img-wrap {
            border-radius: 16px;
            overflow: hidden;
            height: 480px;
        }

        .press-images .img-wrap img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
        }

        .press-item figcaption {
            font-size: 1.0625rem;
            line-height: 1.75;
            color: #111;
        }

        .video-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .video-wrap iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .header-inner {
                padding: 24px 28px;
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }

            nav {
                gap: 20px;
                flex-wrap: wrap;
            }

            .publicity {
                padding: 0 28px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-inner">
            <a href="index.html" class="site-name">Veronica Ward</a>
            <nav>
                <a href="index.html">Books</a>
                <a href="about.html">About</a>
                <a href="publicity.html" class="active">Publicity</a>
                <a href="https://www.linkedin.com/in/veronica-ward/" target="_blank">Connect</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="publicity">
            <div class="press-grid">
                <div class="press-item">
                    <figure>
                        <div class="video-wrap">
                            <iframe src="https://www.youtube.com/embed/JSHBWDAJ2B4?start=534" allowfullscreen></iframe>
                        </div>
                        <figcaption>Appeared as a guest on Mr. Maeda's Cozy AI Kitchen 2025</figcaption>
                    </figure>
                </div>
                <!-- <div class="press-item">
                    <figure>
                        <div class="video-wrap">
                            <iframe src="https://www.youtube.com/embed/OeBPIJKnAJA" allowfullscreen></iframe>
                        </div>
                        <figcaption>Lead designer for Microsoft Foundry Workflows 2025</figcaption>
                    </figure>
                </div> -->
                <div class="press-item">
                    <figure>
                        <div class="press-images">
                            <div class="img-wrap"><img src="vera-farmiga.png" alt="Vera Farmiga wearing Eddie Bauer sweater"></div>
                            <div class="img-wrap"><img src="vera-farmiga-sweater.png" alt="Eddie Bauer sweater design"></div>
                        </div>
                        <figcaption>Vera Farmiga on Bates Motel 2016 in an Eddie Bauer sweater I designed</figcaption>
                    </figure>
                </div>
                <div class="press-item">
                    <figure>
                        <div class="press-images">
                            <div class="img-wrap"><img src="michelle-wolf.png" alt="Michelle Wolf on Late Night with Seth Meyers"></div>
                            <div class="img-wrap"><img src="michelle-wolf-plaid.png" alt="Eddie Bauer plaid design"></div>
                        </div>
                        <figcaption>Michelle Wolf on Late Night with Seth Meyers 2016 in an Eddie Bauer plaid I designed</figcaption>
                    </figure>
                </div>
                <div class="press-item">
                    <figure>
                        <div class="press-images">
                            <div class="img-wrap"><img src="tina-fey.png" alt="Tina Fey wearing Eddie Bauer plaid"></div>
                            <div class="img-wrap"><img src="tina-fey-plaid.png" alt="Eddie Bauer plaid design"></div>
                        </div>
                        <figcaption>Tina Fey on 30 Rock 2009 in an Eddie Bauer plaid I designed</figcaption>
                    </figure>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
