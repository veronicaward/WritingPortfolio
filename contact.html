<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Veronica Ward</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,700;0,800;1,400;1,500&display=swap" rel="stylesheet">
    <style>
        :root {
            font-size: clamp(16px, 1.4vw, 22px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #fff;
            color: #111;
            font-family: 'EB Garamond', Garamond, 'Times New Roman', serif;
            -webkit-font-smoothing: antialiased;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        /* ── TOP BAR ── */
        header {
            position: sticky;
            top: 0;
            background: #fff;
            z-index: 100;
        }

        .header-inner {
            max-width: 960px;
            margin: 0 auto;
            padding: 32px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .site-name {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        nav {
            display: flex;
            gap: 28px;
            font-size: 1rem;
            letter-spacing: 0.03em;
        }

        nav a {
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        nav a:hover,
        nav a.active {
            opacity: 1;
        }

        /* ── CONTACT FORM ── */
        main {
            padding: 24px 0 40px;
        }

        .contact {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 40px;
        }

        .form-section-label {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 1rem;
        }

        .field-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 0.875rem;
        }

        label {
            font-size: 1rem;
        }

        label span {
            opacity: 0.45;
            font-size: 0.875rem;
            margin-left: 6px;
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            font-family: 'EB Garamond', Garamond, 'Times New Roman', serif;
            font-size: 1rem;
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #f7f7f7;
            color: #111;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        textarea:focus {
            border-color: #111;
            background: #fff;
        }

        textarea {
            height: 100px;
            resize: vertical;
        }

        .submit-btn {
            margin-top: 1rem;
            background: #111;
            color: #fff;
            font-family: 'EB Garamond', Garamond, 'Times New Roman', serif;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 14px 32px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .submit-btn:hover {
            background: #333;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .header-inner {
                padding: 24px 28px;
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }

            nav {
                gap: 20px;
                flex-wrap: wrap;
            }

            .contact {
                padding: 0 28px;
            }

            .field-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-inner">
            <a href="index.html" class="site-name">Veronica Ward</a>
            <nav>
                <a href="index.html">Books</a>
                <a href="about.html">About</a>
                <a href="publicity.html">Publicity</a>
                <a href="https://www.linkedin.com/in/veronica-ward/" target="_blank">Connect</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="contact">
            <form action="https://formsubmit.co/veronicaward300@gmail.com" method="POST">
                <input type="hidden" name="_subject" value="New message from veronicaward.com">
                <input type="hidden" name="_next" value="https://veronicaward.github.io/WritingPortfolio/contact.html">
                <input type="hidden" name="_captcha" value="false">
                <div class="field-row">
                    <div class="field">
                        <label>First Name</label>
                        <input type="text" name="first-name">
                    </div>
                    <div class="field">
                        <label>Last Name</label>
                        <input type="text" name="last-name">
                    </div>
                </div>

                <div class="field">
                    <label>Email Address</label>
                    <input type="email" name="email">
                </div>

                <div class="field">
                    <label>Subject</label>
                    <input type="text" name="subject">
                </div>

                <div class="field">
                    <label>Message</label>
                    <textarea name="message"></textarea>
                </div>

                <button type="submit" class="submit-btn">Submit</button>
            </form>
        </div>
    </main>

</body>
</html>
