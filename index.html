<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veronica Ward</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,700;0,800;1,400;1,500&display=swap" rel="stylesheet">
    <style>
        :root {
            font-size: clamp(16px, 1.4vw, 22px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #fff;
            color: #111;
            font-family: 'EB Garamond', Garamond, 'Times New Roman', serif;
            -webkit-font-smoothing: antialiased;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        /* ── CENTERED CONTAINER ── */
        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 40px;
        }

        /* ── TOP BAR ── */
        header {
            position: sticky;
            top: 0;
            background: #fff;
            z-index: 100;
        }

        .header-inner {
            max-width: 960px;
            margin: 0 auto;
            padding: 32px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .site-name {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        nav {
            display: flex;
            gap: 28px;
            font-size: 1rem;
            letter-spacing: 0.03em;
        }

        nav a {
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        nav a:hover,
        nav a.active {
            opacity: 1;
        }

        /* ── GRID ── */
        main {
            padding: 48px 0;
        }

        .grid {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 40px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 28px;
        }

        .tile {
            cursor: pointer;
        }

        .tile-image {
            aspect-ratio: 3 / 4;
            width: 100%;
            background: #ebebeb;
            margin-bottom: 14px;
            transition: opacity 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: #999;
            font-weight: 400;
        }

        .tile:hover .tile-image {
            opacity: 0.75;
        }

        .tile-title {
            font-size: 1rem;
            font-weight: 400;
            margin-bottom: 5px;
        }

        .tile-subtitle {
            font-size: 1rem;
            color: #888;
            font-weight: 400;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .header-inner {
                padding: 24px 28px;
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }

            nav {
                gap: 20px;
                flex-wrap: wrap;
            }

            .grid {
                padding: 0 28px;
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }
        }

        @media (max-width: 480px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-inner">
            <a href="index.html" class="site-name">Veronica Ward</a>
            <nav>
                <a href="index.html" class="active">Books</a>
                <a href="about.html">About</a>
                <a href="publicity.html">Publicity</a>
                <a href="contact.html">Contact</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="grid">

            <div class="tile" onclick="location.href='hidden-connections.html'" style="cursor:pointer;">
                <div class="tile-image"></div>
                <div class="tile-title">Hidden Connections</div>
            </div>

            <div class="tile">
                <div class="tile-image">Coming soon</div>
                <div class="tile-title">Alien Rapture</div>
            </div>

            <div class="tile">
                <div class="tile-image">Coming soon</div>
                <div class="tile-title">Part of your world</div>
            </div>

        </div>
    </main>

</body>
</html>
